patch:
  style:
    # 哪个好用一点
    color_scheme: dracula
    # color_scheme: md

    font_face: "Segoe UI Emoji:80, LXGW Wenkai"
    font_point: 18 # 全局字体大小

    comment_font_point: 16 # 注释字体大小，不设定 fallback 到 font_point
    comment_font_face: "LXGW WenKai" # 注释字体

    label_font_face: "LXGW WenKai" # 标签字体
    label_font_point: 18 # 标签字体大小，不设定 fallback 到 font_point

    horizontal: true # 水平排列
    inline_preedit: true #单行显示，false双行显示

    corner_radius: 6 # 窗口圓角半徑
    border_height: 8 # 窗口邊界高度，大於圓角半徑才有效果
    border_width: 8 # 窗口邊界寬度，大於圓角半徑才有效果
    hilited_corner_radius: 5 # 高亮圆角
    layout:
      border: 2
      border_width: 2
      round_corner: 12 #候选字背景色块圆角幅度
      margin_x: 5 #候选字左右边距
      margin_y: 6 #候选字上下边距
      hilite_padding: 4 #候选字背景色色块高度 若想候选字背景色块无边界填充候选框，仅需其高度和候选字上下边距一致即可
      hilite_spacing: 10 #序号和候选字之间的间隔
      spacing: 5
      candidate_spacing: 18 #候选字间隔
  # 皮肤主题
  preset_color_schemes:
    dracula:
      name: dracula
      back_color: 0x362A28
      border_color: 0x000000
      text_color: 0x6CB8FF
      hilited_text_color: 0x5A4744
      hilited_back_color: 0xF2F8F8
      # hilited_candidate_label_color: 0xfafafa
      hilited_candidate_label_color: 0xffffff
      hilited_candidate_text_color: 0xF2F8F8
      hilited_candidate_back_color: 0xF993BD
      hilited_comment_text_color: 0x362b00
      candidate_text_color: 0xF993BD
      comment_text_color: 0xFDE98B

    dracula_light:
      name: dracula_light
      back_color: 0xF2F8F8
      border_color: 0xF2F8F8
      text_color: 0x362A28
      hilited_text_color: 0x362A28
