patch:
  style:
    # color_scheme: dracula
    color_scheme: dracula_light

    font_face: "Segoe UI Emoji:80, LXGW Wenkai"
    label_font_face: "LXGW WenKai" # 标签字体
    comment_font_face: "LXGW WenKai" # 注释字体
    font_point: 18 # 全局字体大小
    label_font_point: 16 # 标签字体大小，不设定 fallback 到 font_point
    comment_font_point: 16 # 注释字体大小，不设定 fallback 到 font_point
    horizontal: true
    inline_preedit: true
    label_font_point: 16
    corner_radius: 5
    hilited_corner_radius: 0
    layout:
      border: 2
      round_corner: 10
      margin_x: 5
      margin_y: 5
      hilite_padding: 5
      hilite_spacing: 5
      spacing: 5
      candidate_spacing: 20

  # 皮肤主题
  preset_color_schemes:
  
    dracula:
      name: dracula
      horizontal: true            
      candidate_format: "%c %@ "  
      font_point: 16              
      label_font_point: 14        
      corner_radius: 5            
      line_spacing: 10            
      back_color: 0x362A28
      border_color: 0x362A28
      text_color: 0x6CB8FF
      hilited_text_color: 0x5A4744
      hilited_back_color: 0xF2F8F8
      hilited_candidate_label_color: 0xfafafa
      hilited_candidate_text_color: 0xF2F8F8 
      hilited_candidate_back_color: 0xF993BD  
      hilited_comment_text_color: 0x362b00   
      candidate_text_color: 0xF993BD 
      comment_text_color: 0xFDE98B
      inline_preedit: true                      
  
    dracula_light:
      name: dracula_light
      horizontal: true             
      candidate_format: "%c %@ "   
      font_point: 18               
      label_font_point: 16         
      corner_radius: 5             
      line_spacing: 10             
      back_color: 0xF2F8F8
      border_color: 0xF2F8F8
      text_color: 0x362A28
      hilited_text_color: 0x362A28
      hilited_back_color: 0xF2F8F8
      hilited_candidate_label_color: 0xF2F8F8
      hilited_candidate_text_color:  0xF2F8F8
      hilited_candidate_back_color: 0xF993BD 
      hilited_comment_text_color: 0x362b00   
      candidate_text_color: 0x362A28 
      comment_text_color: 0x5A4744
      inline_preedit: true      
